name: front_end
description: A new Flutter project
publish_to: 'none'

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  mobile_scanner: ^6.0.0
  camera: ^0.10.5+5
  google_mlkit_face_detection: ^0.11.0
  image: ^4.1.3
  local_auth: ^2.3.0
  device_info_plus: ^11.0.0
  google_sign_in: ^6.2.1
  qr_flutter: ^4.1.0
  path_provider: ^2.1.4
  # Location & Maps
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  image_gallery_saver_plus: ^4.0.1
  mask_text_input_formatter: ^2.9.0
  pinput: ^6.0.2
  image_picker: ^1.1.2
  fl_chart: ^0.70.2
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  excel: ^4.0.6
  open_filex: any
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  calendar_date_picker2: ^1.1.9
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/videnti_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/videnti_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/